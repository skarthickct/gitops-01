name: Build Step

on:
  push:
    branches: ['master']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]  # Updated to LTS
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'  # Caches npm's cache directory (~/.npm)

      - name: Set Nexus npm registry
        run: |
          echo "registry=${{ secrets.NPM_REGISTRY }}" > .npmrc
          echo "//${{ secrets.NPM_REGISTRY }}:_authToken=${{ secrets.NPM_AUTH_TOKEN }}" >> .npmrc

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Dependencies
        run: npm install --verbose

      - name: Build Project
        run: npm run build  # Remove --if-present to fail if missing

  test-stage:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3  # Only needed if tests require code
      - run: npm test  # Replace with actual test command

  build-and-push-docker-image:
    name: Build Docker Image and Push
    runs-on: ubuntu-latest
    needs: [build, test-stage]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.G_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v3
        with:
          context: ./
          tags: |
            karthickct/gitops-01:${{ github.sha }}
            ghcr.io/skarthickct/gitops-01:${{ github.sha }}
          push: ${{ github.ref == 'refs/heads/master' }}
          cache-from: type=registry,ref=ghcr.io/skarthickct/gitops-01:latest

  update-manifest-stage:
    runs-on: ubuntu-latest
    needs: [build-and-push-docker-image]
    steps:
      - uses: actions/checkout@v3
        with:
          repository: skarthickct/gitops-infra
          ref: master
          token: ${{ secrets.G_TOKEN }}

      - name: Setup Git and yq
        run: |
          git config --global user.email "karthick@cloudthat.com"
          git config --global user.name "skarthickct"
          sudo apt-get install -y pip
          sudo pip install yq

      - name: Update Image in Deployment YAML
        run: |
          yq eval -i ".spec.template.spec.containers[0].image = \"skarthickct/gitops-01:${{ github.sha }}\"" deployment.yaml

      - name: Check for changes
        id: check-changes
        run: |
          git diff --exit-code || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and Push
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push origin master
